## 自检清单 (用于手动触发)

### 每日自检命令
```
1. 扫描核心目录状态
2. 检查MEMORY.md更新
3. 验证飞轮迭代进度
4. 更新能力评分
5. 记录待办任务
```

### 周自检命令
```
1. 执行每日自检全部项目
2. 生成周进化报告
3. 评估能力评分趋势
4. 规划下周迭代
```

