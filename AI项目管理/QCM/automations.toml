# === 自检自动化 ===
[[automation]]
id = "self_check_daily"
name = "每日自检"
description = "每日核心文件状态检查"
schedule = "DAILY 09:00"
status = "ACTIVE"
last_run = "2026-04-21"

[[automation.task]]
type = "scan"
target = ["根目录", "AI项目管理"]

[[automation.task]]
type = "check"
target = "MEMORY.md"

[[automation.task]]
type = "update"
target = "能力评分"

# === 飞轮迭代自动化 ===
[[automation]]
id = "flywheel_daily"
name = "每日飞轮迭代"
description = "每日飞轮6阶段执行"
