name: Q-SpecTrum CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install chromadb networkx

      - name: Run verify-integration.py
        run: python verify-integration.py

      - name: Run pytest (unit tests)
        run: python -m pytest tests/ --ignore=tests/test_regression.py -v --tb=short

      - name: Run document number consistency check
        run: python .githooks/check_doc_numbers.py

  lint:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --exclude BRAIN-KB --exclude _HANDOFF --exclude __pycache__ --exclude .venv
