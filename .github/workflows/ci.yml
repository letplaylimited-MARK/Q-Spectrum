name: Q-SpecTrum CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov anyio

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short -x --ignore=tests/test_server_startup.py --ignore=tests/test_regression.py

      - name: Run status check
        run: python run.py --status

      - name: Run security validation
        run: python scripts/security-check.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: |
          python -m py_compile api_server.py
          python -m py_compile run.py
          python -m py_compile ghost_channel_gate.py
          python -m py_compile ghost_channel_adapter.py
          python -m py_compile qspectrum_engine.py
          for f in brain_core/*.py; do python -m py_compile "$f"; done

      - name: Verify no hardcoded secrets
        run: python scripts/security-check.py --quick
